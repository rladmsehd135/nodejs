<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table, tr, td, th{
            border : 1px solid black;
            border-collapse: collapse;
            padding : 5px 10px;
            text-align: center;
        }
        th{
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: azure;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html мҪ”л“ңлҠ” idк°Җ appмқё нғңк·ё м•Ҳм—җм„ң мһ‘м—… -->
         <div>
            <table>
                <tr>
                    <td>н•ҷлІҲ</td>
                    <td>мқҙлҰ„</td>
                    <td>н•ҷкіј</td>
                    <td>мӮӯм ң</td>
                    
                </tr>
                <tr v-for="item in list">
                    <td><a :href="item.viewUrl">{{item.STU_NO}}</a></td>
                    <td>
                       <a href="javascript:;" @click="fnEdit(item.STU_NO)">{{item.STU_NAME}}</a>
                    </td>
                    <td>{{item.STU_DEPT}}</td>
                    <td><button @click="fnRemove(item.STU_NO)">мӮӯм ң</button></td>
                    <!-- мҲҳм • лІ„нҠј нҒҙлҰӯ мӢң н•ҙлӢ№ н•ҷмғқмқҳ н•ҷкіјлҘј 'мҶҢн”„нҠёмӣЁм–ҙ'лЎң ліҖкІҪ -->
                    
                </tr>
            </table>

        </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // ліҖмҲҳ - (key : value)
                list : []
                
            };
        },
        methods: {
            // н•ЁмҲҳ(л©”мҶҢл“ң) - (key : function())
            fnList: function () {
                let self = this;
                //fetchмқҳ кё°ліё methodлҠ” get 
                //м„ңлІ„мқҳ getн•ЁмҲҳ нҳём¶ң 
                fetch("http://localhost:3000/student")
                    .then(res => res.json())
                    .then(data => {
                        self.list = data.list;
                        self.list.forEach(item => {
                            item.viewUrl2 = "stu-view.html?stuNo="+item.STU_NO
                        })
                    })
            },
            fnRemove : function(stuNo){
                let self = this;
                fetch("http://localhost:3000/student/"+stuNo, {
                    method : "DELETE"
                })
                    .then(res => res.json())
                    .then(data => {
                        alert("мӮӯм ң лҗЁ!")
                        self.fnList();
                    })
            },
            fnEdit : function(stuNo){
                
                location.href = "stu-edit.html?stuNo="+stuNo;

            },
            fnView : function(stuNo){
                
                location.href = "stu-view.html?stuNo="+stuNo;

            }
        }, // methods
        
        mounted() {
            // мІҳмқҢ мӢңмһ‘н•  л•Ң мӢӨн–үлҗҳлҠ” л¶Җл¶„
            let self = this;
            self.fnList();
        }
    });

    app.mount('#app');
</script>
