<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table, tr, td, th{
            border : 1px solid black;
            border-collapse: collapse;
            padding : 5px 10px;
            text-align: center;
        }
        th{
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: azure;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html 코드는 id가 app인 태그 안에서 작업 -->
         <div>
            <table>
                <tr>
                    <td>학번</td>
                    <td>이름</td>
                    <td>학과</td>
                    <td>삭제</td>
                    
                </tr>
                <tr v-for="item in list">
                    <td><a :href="item.viewUrl">{{item.STU_NO}}</a></td>
                    <td>
                       <a href="javascript:;" @click="fnEdit(item.STU_NO)">{{item.STU_NAME}}</a>
                    </td>
                    <td>{{item.STU_DEPT}}</td>
                    <td><button @click="fnRemove(item.STU_NO)">삭제</button></td>
                    <!-- 수정 버튼 클릭 시 해당 학생의 학과를 '소프트웨어'로 변경 -->
                    
                </tr>
            </table>

        </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list : []
                
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnList: function () {
                let self = this;
                //fetch의 기본 method는 get 
                //서버의 get함수 호출 
                fetch("http://localhost:3000/student")
                    .then(res => res.json())
                    .then(data => {
                        self.list = data.list;
                        for(let i=0; i<self.list.length; i++){
                            self.list[i].viewUrl = "stu-view.html?stuNo="+self.list[i].STU_NO;
                        }

                        self.list.forEach(item => {
                            item.viewUrl2 = "stu-view.html?stuNo="+item.STU_NO
                        })
                    })
            },
            fnRemove : function(stuNo){
                let self = this;
                fetch("http://localhost:3000/student/"+stuNo, {
                    method : "DELETE"
                })
                    .then(res => res.json())
                    .then(data => {
                        alert("삭제 됨!")
                        self.fnList();
                    })
            },
            fnEdit : function(stuNo){
                
                location.href = "stu-edit.html?stuNo="+stuNo;

            },
            fnView : function(stuNo){
                
                location.href = "stu-view.html?stuNo="+stuNo;

            }
        }, // methods
        
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            self.fnList();
        }
    });

    app.mount('#app');
</script>
