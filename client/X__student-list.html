<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table,
        tr,
        td,
        th {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px 10px;
            text-align: center;
        }

        th {
            background-color: beige;
        }

        tr:nth-child(even) {
            background-color: azure;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->
        <div>
            <table>
                <tr>
                    <td>학번</td>
                    <td>이름</td>
                    <td>학과</td>
                    <td>삭제</td>
                    <td>수정</td>
                </tr>
                <tr v-for="item in list">
                    <td>{{item.STU_NO}}</td>
                    <td>{{item.STU_NAME}}</td>
                    <td>{{item.STU_DEPT}}</td>
                    <td><button @click="fnRemove(item.STU_NO)">삭제</button></td>
                    <!-- 수정 버튼 클릭 시 해당 학생의 학과를 '소프트웨어'로 변경 -->
                    <td><button @click="fnEdit(item.STU_NO)">수정</button></td>
                </tr>
            </table>

        </div>
    </div>
</body>

</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list: []
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnUserList: function () {
                let self = this;
                fetch("http://localhost:3000/stu/list")
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        self.list = data.list;
                    })
            },
            fnRemove: function (STU_NO) {
                let self = this;
                fetch("http://localhost:3000/stu/remove?stuNo="+STU_NO)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        alert("삭제 됨!")
                        self.fnUserList();
                    })
            },
             fnEdit: function (STU_NO) {
                let self = this;
                fetch("http://localhost:3000/stu/edit?stuNo="+STU_NO)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        alert("수정 됨!")
                        self.fnUserList();
                    })
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            this.fnUserList();
        }
    });

    app.mount('#app');
</script>
