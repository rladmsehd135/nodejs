<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table, tr, td, th{
            border : 1px solid black;
            border-collapse: collapse;
            padding : 5px 10px;
            text-align: center;
        }
        th{
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: azure;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- html 코드는 id가 app인 태그 안에서 작업 -->
        <div style="margin : 20px">
            <div>
                <label>검색어 : 
                    <input v-model="keyword"> 
                    <button @click="fnList">검색</button>
                </label>
                <select v-model="orderKey" @change="fnList" style="margin-left : 10px">
                    <option value="date">날짜순</option>
                    <option value="title">제목순</option>
                    <option value="cnt">조회수</option>
                </select>
            </div>

        </div>
        <div>
            <table>
                <tr>
                    <td>번호</td>
                    <td>제목</td>
                    <td>작성자</td>
                    <td>조회수</td>
                    <td>작성일</td>
                </tr>
                <tr v-for="item in list">
                    <td>{{item.boardNo}}</td>
                    <td>
                       <a href="javascript:;" @click="fnView(item.boardNo)"> {{item.title}} </a>
                    </td>
                    <td>{{item.userId}}</td>
                    <td>{{item.cnt}}</td>
                    <td>{{item.cDateTime}}</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list : [],
                keyword : "",
                orderKey : "date"
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnList: function () {
                let self = this;
                fetch(`http://localhost:3000/board?keyword=${self.keyword}&orderKey=${self.orderKey}`)
                    .then(res => res.json())
                    .then(data => {
                        self.list = data.list;
                    })
            },
            fnView : function(boardNo){
                location.href="board-view.html?boardNo="+boardNo;
                
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            self.fnList();
        }
    });

    app.mount('#app');
</script>
