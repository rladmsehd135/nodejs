<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table,
        tr,
        td,
        th {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px 10px;
            text-align: center;
        }

        th {
            background-color: beige;
        }

        tr:nth-child(even) {
            background-color: azure;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- html 코드는 id가 app인 태그 안에서 작업 -->
        <div>
            <label>제목 : <input v-model="info.title"></label>
        </div>
        <div>
            <label>내용 : <input v-model="info.contents"></label>
        </div>

        <div>
            <button @click="fnAdd">추가</button>
        </div>
    </div>
</body>

</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                
                info: {
                    title : "",
                    contents : "",
                    userId : "test"
                }
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
           
            fnAdd: function () {
                let self = this;
                if (!self.boardNo) {
                    alert('boardNo가 없습니다. 새로고침 후 다시 시도하세요.');
                    return;
                }
                const url = "http://localhost:3000/board/";
                fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-type": "application/json"
                    },
                    body: JSON.stringify(self.info)
                })
                    .then(res => {
                        if (!res.ok) {
                            return res.text().then(text => { throw new Error(text) });
                        }
                        return res.json();
                    })
                    .then(data => {
                        alert("저장되었습니다.");
                        location.href = "board-list.html"
                    })
                    .catch(err => {
                        
                        alert('수정 중 오류가 발생했습니다. 콘솔을 확인하세요.');
                    });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            
        }
    });

    app.mount('#app');
</script>
