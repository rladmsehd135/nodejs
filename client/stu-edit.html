<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        table,
        tr,
        td,
        th {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px 10px;
            text-align: center;
        }

        th {
            background-color: beige;
        }

        tr:nth-child(even) {
            background-color: azure;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- html 코드는 id가 app인 태그 안에서 작업 -->
        <div>
            <label>학번 : <input v-model="info.stuNo" disabled></label>
        </div>
        <div>
            <label>이름 : <input v-model="info.stuName"></label>
        </div>
        <div>
            <label>학과 : <input v-model="info.stuDept"></label>
        </div>
        <div>
            <label>학년 : <input v-model="info.stuGrade"></label>
        </div>
        <div>
            <button @click="fnEdit">수정</button>
        </div>
    </div>
</body>

</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                info: {
                    stuNo: "",
                    stuName: "",
                    stuDept: "",
                    stuGrade: ""
                }
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnGetInfo: function () {
                let self = this;
                fetch("http://localhost:3000/student/"+self.info.stuNo)
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        self.info = data.info
                    })
            },
            fnEdit : function(){
                let self = this;
                fetch("http://localhost:3000/student/"+self.info.stuNo, {
                    method : "PUT",
                    headers : {
                        "Content-type" : "application/json"
                    },
                    body : JSON.stringify(self.info)
                })
                    .then(res => res.json())
                    .then(data => {
                        alert("수정되었습니다.");
                        location.href="stu-list.html"
                    })
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            const queryParams = new URLSearchParams(window.location.search);
            self.info.stuNo = queryParams.get('stuNo') || '';
            self.fnGetInfo();
        }
    });

    app.mount('#app');
</script>
